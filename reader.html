<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阅读 — 草木留声</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="reader-page">

  <!-- 阅读进度条 -->
  <div class="reading-progress" id="readingProgress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

  <!-- 顶部导航栏 -->
  <header class="reader-bar" id="readerBar">
    <a href="index.html" class="back-btn" aria-label="返回首页">
      <span class="back-arrow">←</span>
      <span class="back-text">首页</span>
    </a>
    <div class="reader-title" id="readerTitle">加载中…</div>
    <div class="reader-controls">
      <button class="ctrl-btn" id="tocToggle" title="目录" aria-label="打开目录" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <rect x="0" y="2" width="6" height="1.5" rx="0.75"/>
          <rect x="8" y="2" width="8" height="1.5" rx="0.75"/>
          <rect x="0" y="7" width="6" height="1.5" rx="0.75"/>
          <rect x="8" y="7" width="8" height="1.5" rx="0.75"/>
          <rect x="0" y="12" width="6" height="1.5" rx="0.75"/>
          <rect x="8" y="12" width="8" height="1.5" rx="0.75"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="fontDecrease" title="缩小字体" aria-label="缩小字体">A-</button>
      <button class="ctrl-btn" id="fontIncrease" title="放大字体" aria-label="放大字体">A+</button>
      <button class="ctrl-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
        <span class="theme-icon theme-icon-moon">🌙</span>
        <span class="theme-icon theme-icon-sun">☀️</span>
      </button>
    </div>
  </header>

  <!-- 目录遮罩（移动端） -->
  <div class="toc-overlay" id="tocOverlay" aria-hidden="true"></div>

  <!-- 目录抽屉 -->
  <aside class="toc-panel" id="tocPanel" aria-label="目录" aria-hidden="true">
    <div class="toc-header">
      <span class="toc-heading-label">目录</span>
      <button class="toc-close" id="tocClose" aria-label="关闭目录">✕</button>
    </div>
    <nav class="toc-nav" id="tocNav"></nav>
  </aside>

  <!-- 阅读区域 -->
  <main class="reader-main" id="readerMain">
    <article class="reader-content" id="readerContent">
      <div class="reader-loading" id="readerLoading">
        <div class="loading-dots">
          <span>·</span><span>·</span><span>·</span>
        </div>
        <p>正在加载</p>
      </div>
    </article>
  </main>

  <!-- marked.js Markdown 解析器 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="js/reader.js"></script>
  <script src="js/giscus.js"></script>
</body>
</html>
