<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>阅读 — 草木留声</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="reader-page">

  <!-- 阅读进度条 -->
  <div class="reading-progress" id="readingProgress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

  <!-- 顶部导航栏 -->
  <header class="reader-bar" id="readerBar">
    <a href="index.html" class="back-btn" aria-label="返回首页">
      <span class="back-arrow">←</span>
      <span class="back-text">首页</span>
    </a>
    <div class="reader-title" id="readerTitle">加载中…</div>
    <div class="reader-controls">
      <button class="ctrl-btn" id="fontDecrease" title="缩小字体" aria-label="缩小字体">A-</button>
      <button class="ctrl-btn" id="fontIncrease" title="放大字体" aria-label="放大字体">A+</button>
      <button class="ctrl-btn" id="themeToggle" title="切换主题" aria-label="切换主题">
        <span class="theme-icon theme-icon-moon">🌙</span>
        <span class="theme-icon theme-icon-sun">☀️</span>
      </button>
    </div>
  </header>

  <!-- 阅读区域 -->
  <main class="reader-main">
    <article class="reader-content" id="readerContent">
      <div class="reader-loading" id="readerLoading">
        <div class="loading-dots">
          <span>·</span><span>·</span><span>·</span>
        </div>
        <p>正在加载</p>
      </div>
    </article>
  </main>

  <!-- marked.js Markdown 解析器 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="js/reader.js"></script>
</body>
</html>
